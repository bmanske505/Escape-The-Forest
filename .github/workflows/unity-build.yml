name: Build and Deploy Unity Game

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Unity
    runs-on: ubuntu-latest
    strategy:
      matrix:
        targetPlatform: [WebGL, StandaloneOSX, StandaloneWindows64]
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Build with Unity
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_USERNAME }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}
          unityVersion: 6000.3.5f1
          buildsPath: build/${{ matrix.targetPlatform }}
          versioning: None

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.targetPlatform }}
          path: build/${{ matrix.targetPlatform }}

  deploy-webgl:
    name: Deploy WebGL to itch.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download WebGL build
        uses: actions/download-artifact@v4
        with:
          name: build-WebGL
          path: build/WebGL

      - name: Deploy WebGL
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey: ${{ secrets.ITCH_API_KEY }}
          gameData: build/WebGL
          itchUsername: ${{ secrets.ITCH_USERNAME }}
          itchGameId: ${{ secrets.ITCH_SLUG }}
          buildChannel: html5

  deploy-mac:
    name: Deploy macOS to itch.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: build-StandaloneOSX
          path: build/StandaloneOSX

      - name: Deploy macOS
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey: ${{ secrets.ITCH_API_KEY }}
          gameData: build/StandaloneOSX
          itchUsername: ${{ secrets.ITCH_USERNAME }}
          itchGameId: ${{ secrets.ITCH_SLUG }}
          buildChannel: mac

  deploy-windows:
    name: Deploy Windows to itch.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: build-StandaloneWindows64
          path: build/StandaloneWindows64

      - name: Deploy Windows
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey: ${{ secrets.ITCH_API_KEY }}
          gameData: build/StandaloneWindows64
          itchUsername: ${{ secrets.ITCH_USERNAME }}
          itchGameId: ${{ secrets.ITCH_SLUG }}
          buildChannel: windows