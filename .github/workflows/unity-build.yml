name: Build and Deploy Unity Game

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Unity
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - targetPlatform: WebGL
          - targetPlatform: StandaloneOSX
          - targetPlatform: StandaloneWindows64
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.targetPlatform }}-
            Library-

      - name: Build with Unity
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_USERNAME }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}
          unityVersion: 6000.3.5f1
          buildsPath: build/${{ matrix.targetPlatform }}
          versioning: None

      # macOS: the .app is a folder, so zip it into a single file before upload
      - name: Zip macOS app
        if: matrix.targetPlatform == 'StandaloneOSX'
        run: |
          cd build/StandaloneOSX/StandaloneOSX
          APP=$(ls -d *.app | head -n 1)
          zip -r "../../../$APP.zip" "$APP"
          echo "MAC_ZIP=$APP.zip" >> $GITHUB_ENV

      - name: Upload macOS artifact
        if: matrix.targetPlatform == 'StandaloneOSX'
        uses: actions/upload-artifact@v4
        with:
          name: build-StandaloneOSX
          path: ${{ env.MAC_ZIP }}

      # Windows: upload just the .exe (and required data folder)
      - name: Upload Windows artifact
        if: matrix.targetPlatform == 'StandaloneWindows64'
        uses: actions/upload-artifact@v4
        with:
          name: build-StandaloneWindows64
          path: build/StandaloneWindows64/StandaloneWindows64/

      - name: Upload WebGL artifact
        if: matrix.targetPlatform == 'WebGL'
        uses: actions/upload-artifact@v4
        with:
          name: build-WebGL
          path: build/WebGL/WebGL/

  deploy-webgl:
    name: Deploy WebGL to itch.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download WebGL build
        uses: actions/download-artifact@v4
        with:
          name: build-WebGL
          path: build/WebGL

      - name: Deploy WebGL
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey: ${{ secrets.ITCH_API_KEY }}
          gameData: build/WebGL
          itchUsername: ${{ secrets.ITCH_USERNAME }}
          itchGameId: ${{ secrets.ITCH_SLUG }}
          buildChannel: html5

  deploy-mac:
    name: Deploy macOS to itch.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: build-StandaloneOSX
          path: build/StandaloneOSX

      - name: Deploy macOS
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey: ${{ secrets.ITCH_API_KEY }}
          gameData: build/StandaloneOSX
          itchUsername: ${{ secrets.ITCH_USERNAME }}
          itchGameId: ${{ secrets.ITCH_SLUG }}
          buildChannel: mac

  deploy-windows:
    name: Deploy Windows to itch.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: build-StandaloneWindows64
          path: build/StandaloneWindows64

      - name: Deploy Windows
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey: ${{ secrets.ITCH_API_KEY }}
          gameData: build/StandaloneWindows64
          itchUsername: ${{ secrets.ITCH_USERNAME }}
          itchGameId: ${{ secrets.ITCH_SLUG }}
          buildChannel: windows